name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'PRD'
        type: choice
        options:
          - PRD
          - TEST

env:
  IMAGE_TAG: 1.${{ github.run_number }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: api
            image: ghcr.io/${{ github.repository_owner }}/auto-verdict-api
            context: ./src/backend
            file: ./src/backend/src/AutoVerdict.Api/Dockerfile
          - name: processing-service
            image: ghcr.io/${{ github.repository_owner }}/auto-verdict-processing-service
            context: ./src/backend
            file: ./src/backend/src/AutoVerdict.ProcessingService/Dockerfile
          - name: frontend
            image: ghcr.io/${{ github.repository_owner }}/auto-verdict-frontend
            context: ./src/frontend
            file: ./src/frontend/Dockerfile
          - name: prerender
            image: ghcr.io/${{ github.repository_owner }}/auto-verdict-prerender
            context: ./src/prerender
            file: ./src/prerender/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract VITE_TEST_MODE from VPS_ENV
        id: vars
        run: |
          TEST_MODE=$(printf '%s\n' "$VPS_ENV" | grep '^TEST_MODE=' | cut -d'=' -f2 | tr -d ' \r\n')
          echo "vite_test_mode=${TEST_MODE:-false}" >> $GITHUB_OUTPUT
        env:
          VPS_ENV: ${{ inputs.environment == 'PRD' && secrets.VPS_ENV_PRD || secrets.VPS_ENV_TEST }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ env.IMAGE_TAG }}
            ${{ matrix.image }}:latest
          build-args: |
            VITE_TEST_MODE=${{ steps.vars.outputs.vite_test_mode }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,infra"
          target: ~/auto-verdict

      - name: Write .env to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cat > ~/auto-verdict/.env << 'ENVEOF'
            ${{ inputs.environment == 'PRD' && secrets.VPS_ENV_PRD || secrets.VPS_ENV_TEST }}
            ENVEOF

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GITHUB_ACTOR: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_PAT,GITHUB_ACTOR,IMAGE_TAG
          command_timeout: 15m
          script: |
            # Fail the workflow on any error: a 2026-07-03 deploy silently
            # failed mid-script (disk full) while the run still showed green.
            set -e
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            cd ~/auto-verdict
            sed -i "s/^IMAGE_TAG=.*/IMAGE_TAG=$IMAGE_TAG/" .env
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
