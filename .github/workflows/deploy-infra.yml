name: Deploy Infra

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'PRD'
        type: choice
        options:
          - PRD
          - TEST

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy config files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml,docker-compose.prod.yml,infra"
          target: ~/auto-verdict

      - name: Write .env to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cat > ~/auto-verdict/.env << 'ENVEOF'
            ${{ inputs.environment == 'PRD' && secrets.VPS_ENV_PRD || secrets.VPS_ENV_TEST }}
            ENVEOF

      - name: Deploy infra to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd ~/auto-verdict
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d \
              postgres nats seaweedfs loki promtail auto-verdict-grafana
