name: auto-verdict

services:
  frontend:
    build:
      context: ./src/frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: ./src/backend
      dockerfile: src/AutoVerdict.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      DATABASE_URL: ${DATABASE_URL:-Host=postgres;Port=5432;Database=autoverdict;Username=autoverdict;Password=autoverdict}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-dev-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-dev-secret-key}
      S3_BUCKET: ${S3_BUCKET:-auto-verdict-local}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      seaweedfs:
        condition: service_started

  processing-service:
    build:
      context: ./src/backend
      dockerfile: src/AutoVerdict.ProcessingService/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      DATABASE_URL: ${DATABASE_URL:-Host=postgres;Port=5432;Database=autoverdict;Username=autoverdict;Password=autoverdict}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-dev-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-dev-secret-key}
      S3_BUCKET: ${S3_BUCKET:-auto-verdict-local}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      seaweedfs:
        condition: service_started

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoverdict}
      POSTGRES_USER: ${POSTGRES_USER:-autoverdict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoverdict}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    volumes:
      - nats_data:/data

  seaweedfs:
    image: chrislusf/seaweedfs:3.85
    command: ["server", "-s3", "-s3.port=8333", "-dir=/data"]
    volumes:
      - seaweedfs_data:/data

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./infra/nginx:/etc/nginx/conf.d:ro
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started

volumes:
  postgres_data:
  nats_data:
  seaweedfs_data:
