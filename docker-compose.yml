name: auto-verdict

services:
  frontend:
    build:
      context: ./src/frontend
      args:
        VITE_TEST_MODE: ${TEST_MODE:-false}
    container_name: auto-verdict-frontend
    depends_on:
      api:
        condition: service_started
    networks:
      - default
      - caddy-gateway

  api:
    build:
      context: ./src/backend
      dockerfile: src/AutoVerdict.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      DATABASE_URL: ${DATABASE_URL:-Host=postgres;Port=5432;Database=autoverdict;Username=autoverdict;Password=autoverdict}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-dev-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-dev-secret-key}
      S3_BUCKET: ${S3_BUCKET:-auto-verdict-local}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-replace-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      WHITELIST_EMAILS: ${WHITELIST_EMAILS:-}
      BILLING_PROVIDER: ${BILLING_PROVIDER:-mock}
      BILLING_API_KEY: ${BILLING_API_KEY:-}
      BILLING_WEBHOOK_SECRET: ${BILLING_WEBHOOK_SECRET:-}
      BILLING_STORE_ID: ${BILLING_STORE_ID:-}
      BILLING_SINGLE_PRODUCT: ${BILLING_SINGLE_PRODUCT:-}
      BILLING_PACK_3: ${BILLING_PACK_3:-}
      TEST_MODE: ${TEST_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      nats-setup:
        condition: service_completed_successfully
      seaweedfs-setup:
        condition: service_completed_successfully
    networks:
      - default
      - caddy-gateway

  processing-service:
    build:
      context: ./src/backend
      dockerfile: src/AutoVerdict.ProcessingService/Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      DATABASE_URL: ${DATABASE_URL:-Host=postgres;Port=5432;Database=autoverdict;Username=autoverdict;Password=autoverdict}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-dev-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-dev-secret-key}
      S3_BUCKET: ${S3_BUCKET:-auto-verdict-local}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      AI_DEFAULT_BUDGET_EUR: ${AI_DEFAULT_BUDGET_EUR:-0.70}
      AI_HARD_BUDGET_EUR: ${AI_HARD_BUDGET_EUR:-2.00}
      AI_USD_TO_EUR_RATE: ${AI_USD_TO_EUR_RATE:-0.92}
      AI_FACT_EXTRACTION_MODEL: ${AI_FACT_EXTRACTION_MODEL:-claude-haiku-4-5}
      AI_RISK_ANALYSIS_MODEL: ${AI_RISK_ANALYSIS_MODEL:-claude-haiku-4-5}
      AI_REPORT_GENERATION_MODEL: ${AI_REPORT_GENERATION_MODEL:-claude-haiku-4-5}
      AI_REPORT_REPAIR_MODEL: ${AI_REPORT_REPAIR_MODEL:-claude-haiku-4-5}
      AI_OPUS_REVIEW_MODEL: ${AI_OPUS_REVIEW_MODEL:-claude-opus-4-1}
      AI_OPUS_REVIEW_ENABLED: ${AI_OPUS_REVIEW_ENABLED:-false}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-}
      PLAYWRIGHT_DEVTOOLS: ${PLAYWRIGHT_DEVTOOLS:-false}
      PLAYWRIGHT_SLOW_MO_MS: ${PLAYWRIGHT_SLOW_MO_MS:-0}
      PLAYWRIGHT_DEBUG_PAUSE_MS: ${PLAYWRIGHT_DEBUG_PAUSE_MS:-0}
      PLAYWRIGHT_BROWSER_CHANNEL: ${PLAYWRIGHT_BROWSER_CHANNEL:-}
      PLAYWRIGHT_BROWSER_EXECUTABLE_PATH: ${PLAYWRIGHT_BROWSER_EXECUTABLE_PATH:-}
      WHITELIST_EMAILS: ${WHITELIST_EMAILS:-}
      TEST_MODE: ${TEST_MODE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      nats-setup:
        condition: service_completed_successfully
      seaweedfs-setup:
        condition: service_completed_successfully

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autoverdict}
      POSTGRES_USER: ${POSTGRES_USER:-autoverdict}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autoverdict}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - nats_data:/data
      - ./infra/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nats-setup:
    image: natsio/nats-box:0.14.5
    command:
      - sh
      - -c
      - |
        nats --server nats://nats:4222 stream add \
          --config /etc/nats/streams/car-checks.json \
          2>/dev/null || echo "Stream already exists"
    volumes:
      - ./infra/nats/streams:/etc/nats/streams:ro
    depends_on:
      nats:
        condition: service_healthy

  seaweedfs:
    image: chrislusf/seaweedfs:3.85
    command: ["server", "-s3", "-s3.port=8333", "-s3.config=/etc/seaweedfs/s3.json", "-dir=/data"]
    volumes:
      - seaweedfs_data:/data
      - ./infra/seaweedfs/s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z $$(hostname -i) 9333 && nc -z $$(hostname -i) 8333"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  seaweedfs-setup:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    entrypoint: sh
    command:
      - -c
      - |
        mc alias set local http://seaweedfs:8333 dev-access-key dev-secret-key --api S3v4
        mc mb --ignore-existing local/auto-verdict-local
    depends_on:
      seaweedfs:
        condition: service_healthy

  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.118.0
  #   command: ["--config=/etc/otelcol-contrib/config.yml"]
  #   volumes:
  #     - ./infra/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
  #   ports:
  #     - "4317:4317"
  #     - "4318:4318"

  # victoria-metrics:
  #   image: victoriametrics/victoria-metrics:v1.107.0
  #   command:
  #     - "-storageDataPath=/victoria-metrics-data"
  #     - "-retentionPeriod=30d"
  #   volumes:
  #     - victoria_metrics_data:/victoria-metrics-data
  #   ports:
  #     - "8428:8428"
  #   depends_on:
  #     - otel-collector

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      default:
      caddy-gateway:
        aliases:
          - grafana

volumes:
  postgres_data:
  nats_data:
  seaweedfs_data:
  grafana_data:

networks:
  caddy-gateway:
    external: true
    name: caddy-gateway
