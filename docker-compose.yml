name: auto-verdict

services:
  # Services attached to the shared caddy-gateway network carry the
  # auto-verdict- prefix in their *service name*: compose publishes the service
  # name as a DNS alias on every attached network, so unprefixed names (api,
  # frontend, ...) collide with other projects on the gateway.
  auto-verdict-frontend:
    build:
      context: ./src/frontend
      args:
        VITE_TEST_MODE: ${TEST_MODE:-false}
    depends_on:
      auto-verdict-api:
        condition: service_started
    networks:
      - default
      - caddy-gateway

  # Dynamic rendering for crawlers: Caddy routes bot User-Agents here, this
  # service renders the SPA with headless Chromium and returns full HTML.
  auto-verdict-prerender:
    build:
      context: ./src/prerender
    networks:
      - default
      - caddy-gateway

  auto-verdict-api:
    build:
      context: ./src/backend
      dockerfile: src/AutoVerdict.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://+:8080}
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      DATABASE_URL: ${DATABASE_URL:-Host=postgres;Port=5432;Database=autoverdict;Username=autoverdict;Password=autoverdict}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-dev-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-dev-secret-key}
      S3_BUCKET: ${S3_BUCKET:-auto-verdict-local}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-replace-in-production}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      WHITELIST_EMAILS: ${WHITELIST_EMAILS:-}
      BILLING_PROVIDER: ${BILLING_PROVIDER:-mock}
      BILLING_API_KEY: ${BILLING_API_KEY:-}
      BILLING_WEBHOOK_SECRET: ${BILLING_WEBHOOK_SECRET:-}
      BILLING_STORE_ID: ${BILLING_STORE_ID:-}
      BILLING_SINGLE_PRODUCT: ${BILLING_SINGLE_PRODUCT:-}
      BILLING_PACK_3: ${BILLING_PACK_3:-}
      TEST_MODE: ${TEST_MODE:-false}
    networks:
      - default
      - caddy-gateway

  # Talks to the shared gateway postgres/nats/seaweedfs in production, so it
  # joins caddy-gateway (auto-verdict- prefix per the shared-network convention).
  auto-verdict-processing:
    build:
      context: ./src/backend
      dockerfile: src/AutoVerdict.ProcessingService/Dockerfile
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      DATABASE_URL: ${DATABASE_URL:-Host=postgres;Port=5432;Database=autoverdict;Username=autoverdict;Password=autoverdict}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-dev-access-key}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-dev-secret-key}
      S3_BUCKET: ${S3_BUCKET:-auto-verdict-local}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-}
      AI_DEFAULT_BUDGET_EUR: ${AI_DEFAULT_BUDGET_EUR:-0.70}
      AI_HARD_BUDGET_EUR: ${AI_HARD_BUDGET_EUR:-2.00}
      AI_USD_TO_EUR_RATE: ${AI_USD_TO_EUR_RATE:-0.92}
      AI_FACT_EXTRACTION_MODEL: ${AI_FACT_EXTRACTION_MODEL:-claude-haiku-4-5}
      AI_RISK_ANALYSIS_MODEL: ${AI_RISK_ANALYSIS_MODEL:-claude-haiku-4-5}
      AI_REPORT_GENERATION_MODEL: ${AI_REPORT_GENERATION_MODEL:-claude-haiku-4-5}
      AI_REPORT_REPAIR_MODEL: ${AI_REPORT_REPAIR_MODEL:-claude-haiku-4-5}
      AI_OPUS_REVIEW_MODEL: ${AI_OPUS_REVIEW_MODEL:-claude-opus-4-1}
      AI_OPUS_REVIEW_ENABLED: ${AI_OPUS_REVIEW_ENABLED:-false}
      PLAYWRIGHT_HEADLESS: ${PLAYWRIGHT_HEADLESS:-}
      PLAYWRIGHT_DEVTOOLS: ${PLAYWRIGHT_DEVTOOLS:-false}
      PLAYWRIGHT_SLOW_MO_MS: ${PLAYWRIGHT_SLOW_MO_MS:-0}
      PLAYWRIGHT_DEBUG_PAUSE_MS: ${PLAYWRIGHT_DEBUG_PAUSE_MS:-0}
      PLAYWRIGHT_BROWSER_CHANNEL: ${PLAYWRIGHT_BROWSER_CHANNEL:-}
      PLAYWRIGHT_BROWSER_EXECUTABLE_PATH: ${PLAYWRIGHT_BROWSER_EXECUTABLE_PATH:-}
      WHITELIST_EMAILS: ${WHITELIST_EMAILS:-}
      TEST_MODE: ${TEST_MODE:-false}
    networks:
      - default
      - caddy-gateway

  # Local-dev postgres/nats/seaweedfs live in docker-compose.override.yml.
  # Production uses the shared vps-gateway services (gateway-postgres,
  # gateway-nats, gateway-seaweedfs) reached over the caddy-gateway network.

  # otel-collector:
  #   image: otel/opentelemetry-collector-contrib:0.118.0
  #   command: ["--config=/etc/otelcol-contrib/config.yml"]
  #   volumes:
  #     - ./infra/otel-collector/config.yml:/etc/otelcol-contrib/config.yml:ro
  #   ports:
  #     - "4317:4317"
  #     - "4318:4318"

  # victoria-metrics:
  #   image: victoriametrics/victoria-metrics:v1.107.0
  #   command:
  #     - "-storageDataPath=/victoria-metrics-data"
  #     - "-retentionPeriod=30d"
  #   volumes:
  #     - victoria_metrics_data:/victoria-metrics-data
  #   ports:
  #     - "8428:8428"
  #   depends_on:
  #     - otel-collector

  loki:
    image: grafana/loki:3.4.3
    command: -config.file=/etc/loki/config.yml
    volumes:
      - loki_data:/loki
      - ./infra/loki/config.yml:/etc/loki/config.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  promtail:
    image: grafana/promtail:3.4.3
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
    depends_on:
      loki:
        condition: service_healthy

  auto-verdict-grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GRAFANA_DB_URL: ${GRAFANA_DB_URL:-gateway-postgres:5432}
      GRAFANA_DB_PASSWORD: ${GRAFANA_DB_PASSWORD:-autoverdict}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - default
      - caddy-gateway

volumes:
  grafana_data:
  loki_data:

networks:
  caddy-gateway:
    external: true
    name: caddy-gateway
