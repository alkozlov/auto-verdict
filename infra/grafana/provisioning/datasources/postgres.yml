apiVersion: 1

# Host and password come from the container environment (GRAFANA_DB_URL /
# GRAFANA_DB_PASSWORD set in docker-compose): prod points at the shared
# gateway-postgres, local dev at the compose-override postgres.
datasources:
  - name: PostgreSQL
    uid: postgresql
    type: grafana-postgresql-datasource
    access: proxy
    url: $__env{GRAFANA_DB_URL}
    database: autoverdict
    user: autoverdict
    secureJsonData:
      password: $__env{GRAFANA_DB_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1700
      timescaledb: false
    editable: true
